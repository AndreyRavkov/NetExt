name: Deploy package to nuget server

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Choose the package"
        required: true
        type: choice
        options:
          - 'ARNetExt.Awaiter'
          - 'ARNetExt.DateTime'
          - 'ARNetExt.MayBe'
          - 'ARNetExt.Models'
          - 'ARNetExt.Require'
          - 'ARNetExt.Strings'
          - 'ARNetExt.Utils'

env:
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  TESTS_PROJ_PATH: ./tests/AR.NetExt.UnitTests/AR.NetExt.UnitTests.csproj

permissions:
  contents: write

jobs:
  job-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check Main Branch
        run: |
           if [[ "${{ github.ref_name }}" != "main" ]]; then
             echo "This workflow can only be triggered on the 'main' branch."
             exit 1
           fi
      - name: Check Repository Owner
        run: |
          if [[ "${{ github.actor }}" != "${{ github.repository_owner }}" ]]; then
            echo "Unauthorized: Only the repository owner (${ github.repository_owner }) can trigger this workflow."
            exit 1
          fi

  job-tests:
    needs: job-verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            10.x.x
            9.x.x
            8.x.x
            7.x.x
            6.x.x
      - name: Run Tests
        run: dotnet test $TESTS_PROJ_PATH -c Release

  ARNetExt_Awaiter:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.Awaiter' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.Awaiter/AR.NetExt.Awaiter.csproj'

  ARNetExt_DateTime:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.DateTime' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.DateTime/AR.NetExt.DateTime.csproj'

  ARNetExt_MayBe:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.MayBe' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.MayBe/AR.NetExt.MayBe.csproj'

  ARNetExt_Models:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.Models' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.Models/AR.NetExt.Models.csproj'
      

  ARNetExt_Require:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.Require' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.Require/AR.NetExt.Require.csproj'
      

  ARNetExt_Strings:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.Strings' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.Strings/AR.NetExt.Strings.csproj'
  
  ARNetExt_Utils:
    needs: job-tests
    uses: ./.github/workflows/deploy-package-flow.yml
    if: ${{ inputs.package_name == 'ARNetExt.Utils' }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      project_path: './src/AR.NetExt.Utils/AR.NetExt.Utils.csproj'